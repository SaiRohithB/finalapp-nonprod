apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ingress
  namespace: cloudns
spec:
  rules:
  - host: {{ .Values.ingress.ingressHost }}
    http:
      paths:
      - path: {{ .Values.ingress.ingressPath }}
        pathType: {{ .Values.ingress.ingressPathType | default "Prefix" }}
        backend:
          service:
            name: {{ .Values.ingress.ingressServiceName }}
            port:
              number: {{ .Values.ingress.ingressServicePort }}