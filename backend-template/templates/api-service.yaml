apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-service
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.service.apiSpecSelectorapp }}
  ports:
  - protocol: {{ .Values.service.apiPortsProtocol }}
    port: {{ .Values.service.apiPortsPort }}
    targetPort: {{ .Values.service.apiPortTargetPort }}
  type: ClusterIP